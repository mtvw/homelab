---
docker_users:
  - debian

docker_packages:
  - ca-certificates
  - docker.io
  - docker-compose
  - nfs-common

docker_stack_enabled: true
docker_stack_name: media-stack
docker_stack_path: /opt/media-stack
docker_stack_config_path: "{{ docker_stack_path }}/config"
docker_stack_compose_file: "{{ docker_stack_path }}/compose.yml"
docker_stack_timezone: Europe/Brussels
docker_stack_user: debian
docker_stack_puid: "1000"
docker_stack_pgid: "1000"
docker_stack_allowed_hosts:
  - 10.0.1.21:3000
  - thuis.infinita.be
  - homepage.thuis.infinita.be
docker_homepage_config_enabled: true
docker_homepage_config_no_log: true
docker_homepage_title: Homelab
docker_homepage_description: Matthias homelab
docker_homepage_docker_server_name: docker01
docker_homepage_base_url: http://thuis.infinita.be
docker_homepage_proxmox_url: https://10.0.1.12:8006
docker_homepage_proxmox_node: pepper
docker_homepage_proxmox_username: ""
docker_homepage_proxmox_password: ""
docker_homepage_pbs_url: https://10.0.1.20:8007
docker_homepage_pbs_datastore: pbs-main
docker_homepage_pbs_username: ""
docker_homepage_pbs_password: ""
docker_homepage_jellyfin_url: http://10.0.1.22:8096
docker_homepage_jellyfin_api_key: ""
docker_homepage_radarr_api_key: ""
docker_homepage_sonarr_api_key: ""
docker_homepage_sabnzbd_api_key: ""
docker_homepage_prowlarr_api_key: ""
docker_homepage_seerr_api_key: ""
docker_homepage_config_files:
  - settings.yaml
  - services.yaml
  - docker.yaml
  - bookmarks.yaml
  - widgets.yaml

docker_traefik_enabled: true
docker_traefik_image: traefik:v3
docker_traefik_http_port: 80
docker_traefik_dashboard_port: 8081
docker_traefik_dashboard_insecure: true
docker_traefik_domain: thuis.infinita.be
docker_traefik_base_host: thuis.infinita.be

docker_watchtower_enabled: true
docker_watchtower_image: containrrr/watchtower:latest
docker_watchtower_schedule: "0 0 8 * * *"
docker_watchtower_notification_url: ""

docker_wud_enabled: true
docker_wud_image: getwud/wud:latest
docker_wud_port: 3001
docker_wud_traefik_host: wud.{{ docker_traefik_domain }}
docker_wud_schedule: "0 8 * * *"

docker_media_mount_enabled: true
docker_media_validate_readable: true
docker_media_validate_writable: false
docker_media_path: /srv/media
docker_media_nas_server: 10.0.1.11
docker_media_nas_export: /volume1/media
docker_media_nfs_fstype: nfs4
docker_media_nfs_options: rw,hard,noatime,noresvport,_netdev,x-systemd.automount,x-systemd.requires=network-online.target
docker_downloads_path: /srv/downloads

docker_media_services:
  - name: radarr
    image: lscr.io/linuxserver/radarr:latest
    port: 7878
    traefik_host: radarr.{{ docker_traefik_domain }}
    config_subdir: radarr
    config_mount_path: /config
    include_stack_ids: true
    mount_media: true
    mount_downloads: true
  - name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    port: 8989
    traefik_host: sonarr.{{ docker_traefik_domain }}
    config_subdir: sonarr
    config_mount_path: /config
    include_stack_ids: true
    mount_media: true
    mount_downloads: true
  - name: sabnzbd
    image: lscr.io/linuxserver/sabnzbd:latest
    port: 8080
    traefik_host: sabnzbd.{{ docker_traefik_domain }}
    config_subdir: sabnzbd
    config_mount_path: /config
    include_stack_ids: true
    mount_media: true
    mount_downloads: true
  - name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    port: 9696
    traefik_host: prowlarr.{{ docker_traefik_domain }}
    config_subdir: prowlarr
    config_mount_path: /config
    include_stack_ids: true
    mount_media: false
    mount_downloads: false
  - name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    port: 5055
    traefik_host: seerr.{{ docker_traefik_domain }}
    config_subdir: seerr
    config_mount_path: /app/config
    init: true
    include_stack_ids: false
    mount_media: false
    mount_downloads: false
    environment:
      LOG_LEVEL: info
      PORT: "5055"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
  - name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    port: 3000
    traefik_host: homepage.{{ docker_traefik_domain }}
    traefik_extra_hosts:
      - "{{ docker_traefik_base_host }}"
    config_subdir: homepage
    config_mount_path: /app/config
    include_stack_ids: false
    mount_media: false
    mount_downloads: false
    mount_docker_socket: true
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "{{ docker_stack_allowed_hosts | join(',') }}"
