---
- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add configured users to Docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Validate Docker daemon is reachable
  ansible.builtin.command:
    argv:
      - docker
      - info
  changed_when: false

- name: Ensure Docker media mountpoint exists
  ansible.builtin.file:
    path: "{{ docker_media_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: docker_stack_enabled and docker_media_mount_enabled

- name: Mount Docker media NAS export
  ansible.posix.mount:
    path: "{{ docker_media_path }}"
    src: "{{ docker_media_nas_server }}:{{ docker_media_nas_export }}"
    fstype: "{{ docker_media_nfs_fstype }}"
    opts: "{{ docker_media_nfs_options }}"
    state: mounted
  when: docker_stack_enabled and docker_media_mount_enabled

- name: Validate Docker media path is readable
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ docker_stack_user }}"
      - --
      - test
      - -r
      - "{{ docker_media_path }}"
  changed_when: false
  when: docker_stack_enabled and docker_media_validate_readable

- name: Validate Docker media path is writable when direct imports are enabled
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ docker_stack_user }}"
      - --
      - test
      - -w
      - "{{ docker_media_path }}"
  changed_when: false
  when: docker_stack_enabled and docker_media_validate_writable

- name: Ensure Docker stack root directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "0755"
  loop:
    - path: "{{ docker_stack_path }}"
      owner: root
      group: root
    - path: "{{ docker_stack_config_path }}"
      owner: root
      group: root
    - path: "{{ docker_downloads_path }}"
      owner: "{{ docker_stack_puid }}"
      group: "{{ docker_stack_pgid }}"
  when: docker_stack_enabled

- name: Validate Docker downloads path is writable
  ansible.builtin.command:
    argv:
      - runuser
      - -u
      - "{{ docker_stack_user }}"
      - --
      - test
      - -w
      - "{{ docker_downloads_path }}"
  changed_when: false
  when: docker_stack_enabled

- name: Ensure Docker service config directories exist
  ansible.builtin.file:
    path: "{{ docker_stack_config_path }}/{{ item.config_subdir }}"
    state: directory
    owner: "{{ docker_stack_puid }}"
    group: "{{ docker_stack_pgid }}"
    mode: "0755"
  loop: "{{ docker_media_services }}"
  when: docker_stack_enabled

- name: Ensure Docker service extra config directories exist
  ansible.builtin.file:
    path: "{{ docker_stack_config_path }}/{{ item.1 }}"
    state: directory
    owner: "{{ docker_stack_puid }}"
    group: "{{ docker_stack_pgid }}"
    mode: "0755"
  loop: "{{ docker_media_services | subelements('extra_config_subdirs', skip_missing=True) }}"
  when: docker_stack_enabled

- name: Ensure WUD store directory exists
  ansible.builtin.file:
    path: "{{ docker_stack_config_path }}/wud"
    state: directory
    owner: "{{ docker_stack_puid }}"
    group: "{{ docker_stack_pgid }}"
    mode: "0755"
  when: docker_stack_enabled and docker_wud_enabled

- name: Check Wealthfolio secret key file
  ansible.builtin.stat:
    path: "{{ docker_stack_config_path }}/wealthfolio/secret_key"
  register: docker_wealthfolio_secret_file
  no_log: true
  when:
    - docker_stack_enabled
    - docker_media_services | selectattr('name', 'equalto', 'wealthfolio') | list | length > 0

- name: Generate Wealthfolio secret key
  ansible.builtin.command:
    argv:
      - openssl
      - rand
      - -base64
      - "32"
  register: docker_wealthfolio_generated_secret
  changed_when: true
  no_log: true
  when:
    - docker_stack_enabled
    - docker_media_services | selectattr('name', 'equalto', 'wealthfolio') | list | length > 0
    - not docker_wealthfolio_secret_file.stat.exists

- name: Persist generated Wealthfolio secret key
  ansible.builtin.copy:
    content: "{{ docker_wealthfolio_generated_secret.stdout }}\n"
    dest: "{{ docker_stack_config_path }}/wealthfolio/secret_key"
    owner: "{{ docker_stack_puid }}"
    group: "{{ docker_stack_pgid }}"
    mode: "0600"
  no_log: true
  when:
    - docker_stack_enabled
    - docker_media_services | selectattr('name', 'equalto', 'wealthfolio') | list | length > 0
    - docker_wealthfolio_generated_secret is defined
    - docker_wealthfolio_generated_secret.stdout is defined

- name: Read Wealthfolio secret key
  ansible.builtin.slurp:
    src: "{{ docker_stack_config_path }}/wealthfolio/secret_key"
  register: docker_wealthfolio_secret_key_file
  no_log: true
  when:
    - docker_stack_enabled
    - docker_media_services | selectattr('name', 'equalto', 'wealthfolio') | list | length > 0

- name: Set Wealthfolio effective secret key
  ansible.builtin.set_fact:
    docker_wealthfolio_effective_secret_key: "{{ docker_wealthfolio_secret_key_file.content | b64decode | trim }}"
  no_log: true
  when:
    - docker_stack_enabled
    - docker_media_services | selectattr('name', 'equalto', 'wealthfolio') | list | length > 0

- name: Install Homepage configuration files
  ansible.builtin.template:
    src: "homepage/{{ item }}.j2"
    dest: "{{ docker_stack_config_path }}/homepage/{{ item }}"
    owner: "{{ docker_stack_puid }}"
    group: "{{ docker_stack_pgid }}"
    mode: "{{ '0600' if item == 'services.yaml' else '0644' }}"
  loop: "{{ docker_homepage_config_files }}"
  register: docker_homepage_config
  no_log: "{{ docker_homepage_config_no_log }}"
  when: docker_stack_enabled and docker_homepage_config_enabled

- name: Install Docker media stack compose file
  ansible.builtin.template:
    src: media-stack.compose.yml.j2
    dest: "{{ docker_stack_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  register: docker_stack_compose
  when: docker_stack_enabled

- name: Install Docker media stack systemd unit
  ansible.builtin.template:
    src: media-stack.service.j2
    dest: "/etc/systemd/system/{{ docker_stack_name }}.service"
    owner: root
    group: root
    mode: "0644"
  register: docker_stack_systemd_unit
  when: docker_stack_enabled

- name: Reload systemd after Docker media stack unit changes
  ansible.builtin.systemd:
    daemon_reload: true
  when: docker_stack_enabled and docker_stack_systemd_unit.changed

- name: Ensure Docker media stack is enabled and running
  ansible.builtin.systemd:
    name: "{{ docker_stack_name }}"
    enabled: true
    state: "{{ 'restarted' if (docker_stack_compose.changed or (docker_homepage_config is defined and docker_homepage_config.changed)) else 'started' }}"
  when: docker_stack_enabled

- name: Ensure Docker media stack HTTP ports are reachable locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ item.port }}"
    timeout: 120
  loop: "{{ docker_media_services }}"
  when: docker_stack_enabled

- name: Ensure WUD HTTP port is reachable locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ docker_wud_port }}"
    timeout: 120
  when: docker_stack_enabled and docker_wud_enabled

- name: Ensure Traefik HTTP and dashboard ports are reachable locally
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ item }}"
    timeout: 120
  loop:
    - "{{ docker_traefik_http_port }}"
    - "{{ docker_traefik_dashboard_port }}"
  when: docker_stack_enabled and docker_traefik_enabled
